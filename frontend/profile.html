<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile — ScamBook</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg scam-nav">
    <div class="container-fluid px-3 px-lg-4">
      <a class="navbar-brand" href="/feed.html">ScamBook</a>
      <div class="search-wrap flex-grow-1 mx-2 mx-lg-4 d-none d-md-block">
        <input type="search" class="form-control w-100" placeholder="Search ScamBook" disabled />
      </div>
      <div class="d-flex align-items-center gap-2">
        <a href="/feed.html" class="btn btn-sm btn-outline-primary">Feed</a>
        <div class="dropdown">
          <button class="btn p-0 border-0 bg-transparent" data-bs-toggle="dropdown">
            <img id="navAvatar" class="avatar-sm" alt="Profile" src="" width="40" height="40" />
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow">
            <li><a class="dropdown-item" href="/profile.html"><i class="bi bi-person me-2"></i>Edit Profile</a></li>
            <li><hr class="dropdown-divider" /></li>
            <li><a class="dropdown-item text-danger" href="#" id="logoutNav"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <div class="container layout-main">
    <div class="card border-0 shadow-sm overflow-hidden">
      <div class="profile-cover"></div>
      <div class="card-body pt-0">
        <div class="profile-avatar-wrap d-flex flex-column flex-md-row align-items-md-end gap-3">
          <img id="profileAvatar" class="avatar-lg" alt="Profile" src="" />
          <div class="pb-2 flex-grow-1">
            <h1 class="h3 fw-bold mb-0" id="displayName">—</h1>
            <p class="text-secondary mb-0" id="displayEmail">—</p>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-3 mt-1">
      <div class="col-lg-6">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h2 class="h5 fw-bold mb-3">Edit profile</h2>
            <div id="profileAlert"></div>
            <form id="profileForm">
              <div class="mb-3">
                <label class="form-label">Display name</label>
                <input type="text" class="form-control" name="name" id="inputName" required minlength="2" maxlength="255" />
              </div>
              <div class="mb-3">
                <label class="form-label">Profile picture</label>
                <input type="file" class="form-control" name="profile_image" id="inputImage" accept="image/*" />
                <div class="form-text">JPEG, PNG, GIF, or WebP — max 5 MB.</div>
              </div>
              <button type="submit" class="btn btn-fb-primary text-white px-4">Save changes</button>
            </form>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card shadow-sm border-0 h-100">
          <div class="card-body">
            <h2 class="h5 fw-bold mb-2">Account</h2>
            <p class="text-secondary small mb-0">
              Password changes and email verification can be added for production. Profile updates use
              <code>PUT /update-profile</code> with JWT authentication.
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/profile.js"></script>
</body>
</html>
