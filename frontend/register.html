<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register — ScamBook</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body class="auth-page">
  <div class="container px-3">
    <div class="card auth-card mx-auto">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <h1 class="h2 text-fb fw-bold mb-1">Create account</h1>
          <p class="text-secondary mb-0">Join ScamBook to share and discuss scams.</p>
        </div>
        <div id="alertBox"></div>
        <form id="regForm">
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" name="name" class="form-control form-control-lg" required minlength="2" maxlength="255" autocomplete="name" />
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control form-control-lg" required autocomplete="email" />
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control form-control-lg" required minlength="8" autocomplete="new-password" />
            <div class="form-text">At least 8 characters.</div>
          </div>
          <button type="submit" class="btn btn-fb-primary btn-lg w-100 text-white">Sign up</button>
        </form>
        <hr class="my-4" />
        <p class="text-center mb-0">
          Already have an account?
          <a href="/login.html" class="text-decoration-none fw-semibold">Log in</a>
        </p>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/api.js"></script>
  <script>
    if (getToken()) window.location.replace('/feed.html');

    const form = document.getElementById('regForm');
    const alertBox = document.getElementById('alertBox');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.innerHTML = '';
      const fd = new FormData(form);
      const body = {
        name: fd.get('name'),
        email: fd.get('email'),
        password: fd.get('password'),
      };
      try {
        const data = await apiFetch('/register', { method: 'POST', body: JSON.stringify(body) });
        setSession(data.token, data.user);
        window.location.href = '/feed.html';
      } catch (err) {
        alertBox.innerHTML =
          '<div class="alert alert-danger py-2">' + (err.message || 'Registration failed') + '</div>';
      }
    });
  </script>
</body>
</html>
